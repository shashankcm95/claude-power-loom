name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # ADR-0011 §combined-bypass: CI DENIES the combined K1+K14 bypass by default
  # (LOOM_DISABLE_WORKTREE=1 + LOOM_ALLOW_OUT_OF_SCOPE_WRITES=1 together = effective
  # kernel bypass). k10-escape-hatch.js evaluateEscapeHatches() returns action:'deny'
  # when this is set alongside both bypass vars. Added in PR-4b (the SEC-PR4-02
  # finding: the ADR claimed "denied in CI by default" but the var was set in no job).
  # Diagnostic jobs needing the bypass must opt OUT explicitly (reviewer-approved).
  LOOM_CI_DENY_COMBINED_BYPASS: "1"

jobs:
  smoke:
    name: Hook smoke + contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # H.9.12.1 hotfix: install shellcheck via apt so Test 81 uses the
      # system binary (avoids `npx --yes shellcheck` GitHub-release binary
      # download which intermittently fails with `socket hang up` on CI
      # runners). Saves ~10-15s per CI run vs npx download too.
      - name: Install shellcheck (apt)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Run hook smoke tests
        run: |
          # H.7.9 fix: --hooks --test installs hooks first, then runs smoke.
          # Plain --test (H.7.8 CI bug) tested already-installed hooks at
          # $CLAUDE_DIR/packages/kernel/hooks/, which doesn't exist on a clean CI
          # checkout — the script bailed with the "test without --hooks
          # tests already-installed hooks, not source" warning + exit 1.
          # H.7.8's CI never validated against a fresh checkout because
          # H.7.8 merged direct to main without going through CI itself.
          set -o pipefail
          bash install.sh --hooks --test 2>&1 | tee /tmp/smoke.log
          # GH Actions' default shell already runs `-eo pipefail`, so install.sh's non-zero
          # exit (install.sh:391) is the PRIMARY gate; this explicit `set -o pipefail` is
          # insurance against a future `shell:` override that would drop it. The ANCHORED
          # ^…$ grep is defense-in-depth — it hardens the (otherwise redundant) content
          # check so a crafted substring in a longer line can't false-green. (GH #228)
          grep -qE '^[[:space:]]*Results: [0-9]+ passed, 0 failed$' /tmp/smoke.log

      - name: Run contracts-validate
        run: |
          set -o pipefail
          node packages/runtime/orchestration/contracts-validate.js 2>&1 | tee /tmp/contracts.log
          # GH Actions' default shell already runs `-eo pipefail`, so the validator's
          # non-zero exit (contracts-validate.js:1501) is the PRIMARY gate; this explicit
          # `set -o pipefail` is insurance against a future `shell:` override. The ANCHORED
          # ^…$ grep is defense-in-depth — it hardens the (otherwise redundant) content
          # check so a crafted filename can't inject the success substring. (GH #228)
          grep -qE '^Total violations: 0$' /tmp/contracts.log

      - name: Persona-agent roster check
        # v3.4 stabilization: guard against the "missing agents/*.md stub → general-purpose
        # fallback" drift that originally motivated generate-persona-agents.js. --check exits
        # non-zero if any roster persona lacks its agents/<name>.md stub (it writes nothing).
        run: node scripts/generate-persona-agents.js --check

      - name: Signpost drift check
        # v3.5 Wave 0: docs/SIGNPOST.md (the repo concern->location navigation index)
        # is AUTO-GENERATED by scripts/generate-signpost.js. --check regenerates +
        # diffs; exits non-zero if the committed doc is stale (a new/moved source file
        # landed without a regenerate). Keeps the index drift-free (EC1) without
        # hand-maintenance. Mirrors the persona-roster --check above.
        run: node scripts/generate-signpost.js --check

  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Use npx to run markdownlint-cli2 without forcing a local npm install.
      # The .markdownlint.json at repo root is auto-discovered.
      # Exclude swarm/ — historical phase findings docs; snapshot-at-phase property.
      # Exclude packages/specs/ — Phase 0 (v3.0-alpha) moved swarm/thoughts/shared/*
      # + swarm/H.*-findings.md + swarm/adrs/* + bench/* → packages/specs/*.
      # Same snapshot-at-phase semantic. 35 pre-existing violations tracked in
      # packages/specs/findings/markdownlint-debt-phase-0.md with a 3-tier
      # remediation plan; once cleaned up, drop "#packages/specs" and re-enforce.
      - name: Run markdownlint
        run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules" "#swarm" "#packages/specs"

  json-validate:
    name: JSON validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Validate every *.json file in the repo (excluding node_modules and
      # transient state directories). Catches malformed plugin.json /
      # marketplace.json / config-guard-patterns.json / hooks.json before
      # they ship.
      - name: Validate all JSON files
        run: |
          set -e
          fail=0
          for f in $(find . -name "*.json" -not -path "./node_modules/*" -not -path "./.git/*" -not -path "./swarm/run-state/*"); do
            if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "INVALID: $f"
              fail=1
            fi
          done
          exit $fail

  kernel-property-tests:
    # Phase 1-alpha PR 0b (per packages/specs/plans/2026-05-27-phase-1-alpha-v3.0-alpha-kernel.md
    # §"Sub-PR Phase-1-alpha/0b"). Closes a CI gap surfaced during /verify-plan
    # round 1 (jade) + round 2 (nova): kernel property-test files at
    # tests/unit/kernel/**/*.test.js are written but NOT executed in CI.
    # Existing `pnpm -r test` echoes "deferred" for every package; existing
    # smoke job runs install.sh smoke tests + contracts-validate but does NOT
    # invoke the kernel property tests directly.
    #
    # Round 1 (jade) caught a silent false-green: `node --test
    # tests/unit/kernel/**/*.test.js` would load the imperative-assert test
    # files, see zero node:test-format `test()`/`describe()` calls, and pass
    # vacuously even when assertions failed — making the gate WORSE than no
    # gate. Round 2 (nova) caught additional fragility: relative `find` path
    # could silently match zero files without an explicit `working-directory`,
    # recreating the original vacuous-pass; `for f in $(find)` word-splits on
    # whitespace.
    #
    # Corrected approach: per-file script-runner loop with explicit working
    # dir, null-delimited find -print0 + read -d '' for whitespace safety,
    # and a `count -eq 0` vacuous-pass guard that fails fast if zero test
    # files matched (defense-in-depth against the cwd / glob mismatch bug).
    name: Kernel property tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run kernel property tests
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          set +e  # explicit; the loop manages exit code via $failed accumulator
          failed=0
          count=0
          while IFS= read -r -d '' f; do
            count=$((count+1))
            echo "::group::$f"
            node "$f"
            rc=$?
            echo "::endgroup::"
            [ $rc -ne 0 ] && failed=1
          done < <(find "$GITHUB_WORKSPACE/tests/unit/kernel" -name '*.test.js' -type f -print0)
          echo "Ran $count test files; failures: $failed"
          # Vacuous-pass guard: if find matched zero files (cwd mismatch, path
          # rename, or globbing failure), fail the job. Without this, a CI
          # config error would silently mark the gate green per nova FAIL.
          if [ "$count" -eq 0 ]; then
            echo "::error::Zero test files matched at $GITHUB_WORKSPACE/tests/unit/kernel — vacuous-pass guard failing the job."
            exit 2
          fi
          exit $failed

  runtime-contracts-tests:
    # v3.1 PR-1 (runtime persona contracts + capability-trait registry). Closes
    # the same silent-false-green gap the kernel-property-tests job closed for
    # tests/unit/kernel: the three PR-1 test files at
    # tests/unit/runtime/contracts/*.test.js (trait-resolve, contracts-validate,
    # traits-registry) are written but otherwise unexecuted — `pnpm -r test`
    # echoes "deferred" per-package and these live under top-level tests/, not a
    # workspace package. Without this job the TDD-treatment failing-tests-first
    # artifacts would never run in CI.
    #
    # Same hardening as kernel-property-tests (jade round-1 / nova round-2):
    # per-file script-runner with explicit working dir, null-delimited
    # find -print0 + read -d '' for whitespace safety, and a `count -eq 0`
    # vacuous-pass guard that fails fast if the find root renames/moves.
    #
    # NOT dormancy-gated: unlike the kernel K* primitives, all three PR-1 test
    # files are GREEN in PR-1 — the 18-contract two-tier migration landed in THIS
    # PR (test 10 is the GREEN-on-migrated regression gate, not an expected-RED
    # placeholder). No --scope subset, no expected-failure carve-out.
    #
    # WIDENED (v3.2 Wave 2, R12): the find root moved from tests/unit/runtime/contracts
    # to tests/unit/runtime (recursive) so ALL runtime unit-test dirs are gated —
    # contracts/ + the new test-runners/ + future R9/R11 dirs — symmetric with the
    # kernel job's broad tests/unit/kernel root (below). Renamed "Runtime tests".
    # (main is unprotected — no required-check name to break by the rename.)
    name: Runtime tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run runtime unit tests (contracts + test-runners + …)
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          set +e  # explicit; the loop manages exit code via $failed accumulator
          failed=0
          count=0
          while IFS= read -r -d '' f; do
            count=$((count+1))
            echo "::group::$f"
            node "$f"
            rc=$?
            echo "::endgroup::"
            [ $rc -ne 0 ] && failed=1
          done < <(find "$GITHUB_WORKSPACE/tests/unit/runtime" -name '*.test.js' -type f -print0)
          echo "Ran $count test files; failures: $failed"
          # Vacuous-pass guard: if find matched zero files (cwd mismatch, path
          # rename, or globbing failure), fail the job rather than pass vacuously.
          if [ "$count" -eq 0 ]; then
            echo "::error::Zero test files matched at $GITHUB_WORKSPACE/tests/unit/runtime — vacuous-pass guard failing the job."
            exit 2
          fi
          exit $failed

  lab-tests:
    # v3.3 Wave 0/1 (Evolution Lab foundation — E1 negative-attestation). Gates the lab unit tests
    # at tests/unit/lab/**/*.test.js (the E1 store + the decompose-run→E1 outbox ingest). Mirrors
    # the runtime-contracts-tests + kernel-property-tests hardening: per-file runner, explicit
    # working dir, null-delimited find -print0 + read -d '', and a count==0 vacuous-pass guard that
    # fails fast if the find root renames/moves. The Lab layer is ADVISORY (RFC §2 Layer 3) — these
    # tests assert the store/ingest contract, never any gating behavior.
    name: Lab tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run lab unit tests (negative-attestation + …)
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          set +e  # explicit; the loop manages exit code via $failed accumulator
          failed=0
          count=0
          while IFS= read -r -d '' f; do
            count=$((count+1))
            echo "::group::$f"
            node "$f"
            rc=$?
            echo "::endgroup::"
            [ $rc -ne 0 ] && failed=1
          done < <(find "$GITHUB_WORKSPACE/tests/unit/lab" -name '*.test.js' -type f -print0)
          echo "Ran $count test files; failures: $failed"
          # Vacuous-pass guard: if find matched zero files (cwd mismatch, path rename, or globbing
          # failure), fail the job rather than pass vacuously.
          if [ "$count" -eq 0 ]; then
            echo "::error::Zero test files matched at $GITHUB_WORKSPACE/tests/unit/lab — vacuous-pass guard failing the job."
            exit 2
          fi
          exit $failed

  aux-unit-tests:
    # v3.4 post-release (CI-coverage gap closed). The kernel/runtime/lab jobs above each gate ONLY
    # their own find root, leaving tests/unit/{scripts,hooks,agents,agent-team,kb} UNGATED — they could
    # rot silently (e.g. self-improve-store.test.js was dead from the v4 restructure #158 until a manual
    # post-release sweep, fixed in PR #256). This job is the CATCH-ALL: it runs every tests/unit
    # *.test.js OUTSIDE kernel/runtime/lab, so any NEW dir is auto-gated (no silent rot). If a future
    # layer gets its own dedicated job above, add its root to the -not -path excludes here to avoid
    # double-running. Mirrors the lab-tests pattern: per-file runner, null-delimited find, vacuous-pass
    # guard. (Tracked: chip task_f6e54208.)
    name: Auxiliary unit tests (outside kernel/runtime/lab)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run auxiliary unit tests (scripts/hooks/agents/agent-team/kb + future dirs)
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          set +e  # explicit; the loop manages exit code via $failed accumulator
          failed=0
          count=0
          while IFS= read -r -d '' f; do
            count=$((count+1))
            echo "::group::$f"
            node "$f"
            rc=$?
            echo "::endgroup::"
            [ $rc -ne 0 ] && failed=1
          done < <(find "$GITHUB_WORKSPACE/tests/unit" -name '*.test.js' -type f \
            -not -path '*/tests/unit/kernel/*' \
            -not -path '*/tests/unit/runtime/*' \
            -not -path '*/tests/unit/lab/*' -print0)
          echo "Ran $count test files; failures: $failed"
          # Vacuous-pass guard: if find matched zero files (cwd mismatch, all roots renamed, or globbing
          # failure), fail rather than pass vacuously — same defense as the kernel/runtime/lab jobs.
          if [ "$count" -eq 0 ]; then
            echo "::error::Zero auxiliary test files matched outside kernel/runtime/lab — vacuous-pass guard failing the job."
            exit 2
          fi
          exit $failed

  dormancy-assertion-k3b:
    # Phase 1-alpha K3.b context-envelope ships DORMANT — the validator module +
    # its JSON schema land in PR 1, but NO production code imports the module
    # (personas opt-in at v3.1, per ADR-0011 §K3.b + plan FL-5). MERGE-BLOCKING,
    # parallel to dormancy-assertion-k9. Specified at PR-1 plan time but omitted
    # when PR 1 shipped; caught by the PR-4 re-grounding and folded into 4b per
    # user decision (Option A). K3.b is a SINGLE module, so a single-token match
    # suffices (vs K9's split-aware disjunction). v3.1's first consumer DELETES
    # this job in the same commit that adds the import — self-removes at dormancy end.
    name: K3.b dormancy assertion
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assert zero production importers of context-envelope
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          # Must return zero hits. Any hit means production code (under packages/,
          # outside tests/, excluding the context-envelope.js module itself)
          # imports the K3.b validator — violating the ship-dormant contract.
          hits=$(grep -rE \
            "require\(['\"][^'\"]*context-envelope['\"]\)|from[[:space:]]+['\"][^'\"]*context-envelope['\"]" \
            packages/ \
            | grep -v "/tests/" \
            | grep -vE "packages/kernel/_lib/context-envelope\.js" \
            || true)
          if [ -n "$hits" ]; then
            echo "::error::K3.b dormancy violation — production import detected:"
            echo "$hits"
            exit 1
          fi
          echo "K3.b dormancy verified: zero production importers."

  dormancy-assertion-k1:
    # Phase 1-alpha K1 worktree-allocator ships DORMANT — the module + tests landed
    # in PR 2, but NO production code allocates a worktree (the resolver does NOT
    # call K1). Added in the v3.0-alpha-hardening pass per the MVP-review QA finding:
    # unlike K9/K3.b, K1 had zero importers AND no tripwire, so it could silently rot
    # or drift from its eventual caller. MERGE-BLOCKING, mirroring dormancy-assertion-k3b.
    # KEPT PERMANENTLY (v3.1 PR-3b, OQ-21 + verify-plan): K1's consumer is SUPERSEDED
    # by the harness. Under observe-don't-allocate (ADR-0012) the harness OWNS worktree
    # creation and exposes it via tool_response.worktreePath at the PostToolUse:Agent
    # spawn-close hook, which OBSERVES rather than allocates — so K1 gains no importer
    # and this job does NOT self-delete. Same dormant-twin treatment as K3.b.
    name: K1 dormancy assertion
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assert zero production importers of worktree-allocator
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          # Must return zero hits. Any hit means production code (under packages/,
          # outside tests/, excluding the worktree-allocator.js module itself)
          # imports K1 — violating the ship-dormant contract.
          hits=$(grep -rE \
            "require\(['\"][^'\"]*worktree-allocator['\"]\)|from[[:space:]]+['\"][^'\"]*worktree-allocator['\"]" \
            packages/ \
            | grep -v "/tests/" \
            | grep -vE "packages/kernel/worktree/worktree-allocator\.js" \
            || true)
          if [ -n "$hits" ]; then
            echo "::error::K1 dormancy violation — production import detected:"
            echo "$hits"
            exit 1
          fi
          echo "K1 dormancy verified: zero production importers."

  # NOTE: dormancy-assertion-k6 was REMOVED 2026-06-03 (v3.2 Wave 2, boundary
  # decision #216). K6 (enforcement/k6-subset-check.js) + the K8-era tool-mask
  # were RETIRED — their only intended consumer (K8) was cancelled per ADR-0012
  # (a PreToolUse hook's updatedInput is inert on Agent/Task spawns). The job's
  # own contract was "self-delete when K6 gains a consumer"; retirement is the
  # terminal case. The K1 + K3.b dormancy jobs above remain (live primitives with
  # pending/superseded consumers).

  layer-boundary-advisory:
    # Phase 1-alpha PR 5 (FINAL sub-PR) — K12 layer-boundary ADVISORY lint
    # (packages/specs/rfcs/v6-substrate-synthesis.md §329-353; v5.1 DOWNGRADE from
    # mandatory after the 6-months-zero-observed-drift empirical finding). Flags
    # inner->outer cross-layer imports (kernel<runtime<lab<adapter dependency rule)
    # + any production->tests import (F23 defense-layer (b), guarding
    # validateTestRecord from a production code path).
    #
    # ADVISORY, NOT merge-blocking: `continue-on-error: true` is the ENTIRE
    # non-blocking mechanism. The lint script exits non-zero on findings (ground
    # truth / mechanism), and this CI line sets the severity (policy) — so the
    # OQ-19 upgrade-to-mandatory (>=3 observed cross-layer drift events across
    # v3.1-v3.3) is a one-line change here: delete `continue-on-error` + add this
    # job to branch-protection required checks. Zero rework in the lint itself.
    #
    # Returns 0 findings on current main (the empirical-zero-drift baseline,
    # v5.1 Round-7). The script computes its own repo root, so cwd is irrelevant.
    name: K12 layer-boundary (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run K12 layer-boundary lint (advisory; non-blocking)
        run: node packages/kernel/_lib/layer-boundary-lint.js
